[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=bot
    --cov=api
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-fail-under=35
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
