                    <span>Budget/cycle: <span className="text-gray-200">{alwaysOnSweep?.params?.time_budget_minutes || 60} min</span></span>
                    <span>Target workers: <span className="text-gray-200">{alwaysOnSweep?.total_configs || 4}</span></span>
                    <span>Search: <span className="text-gray-200">Explore → Exploit → Refine</span></span>
                    <span>Space: <span className="text-gray-200">h=[30,110], x=[50,70], smoothing=[on,off]</span></span>
                </div>

                {/* Settings panel */}
                {showSettings && (
                    <div className="mt-3 pt-3 border-t border-gray-700 space-y-3">
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="text-xs text-gray-400 block mb-1">Time Budget per Cycle (minutes)</label>
                                <input type="number" value={settingsForm.time_budget_minutes}
                                       onChange={e => setSettingsForm({ ...settingsForm, time_budget_minutes: parseInt(e.target.value) || 60 })}
                                       className="w-full bg-gray-700 text-white px-3 py-1.5 rounded text-sm"
                                       min="5" max="1440" />
                            </div>
                            <div>
                                <label className="text-xs text-gray-400 block mb-1">Target Workers</label>
                                <input type="number" value={settingsForm.target_workers}
                                       onChange={e => setSettingsForm({ ...settingsForm, target_workers: parseInt(e.target.value) || 1 })}
                                       className="w-full bg-gray-700 text-white px-3 py-1.5 rounded text-sm"
                                       min="1" max="20" />
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={saveAlwaysOnSettings} disabled={savingSettings}
                                    className="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white text-xs font-semibold py-1.5 px-4 rounded transition">
                                {savingSettings ? 'Saving…' : 'Save Settings'}
                            </button>
                            <button onClick={() => setShowSettings(false)}
                                    className="bg-gray-600 hover:bg-gray-700 text-white text-xs py-1.5 px-4 rounded transition">
                                Cancel
                            </button>
                        </div>
                    </div>
                )}
            </div>

            {/* ── Custom Sweeps (collapsible) ── */}
            <div className="bg-gray-800 rounded-lg p-4">
                <div className="flex items-center justify-between">
                    <div className="text-xs text-gray-400 uppercase tracking-wider">Custom Sweeps</div>
                    <button onClick={() => setShowCustomForm(!showCustomForm)}
                            className="text-xs bg-blue-600 hover:bg-blue-700 text-white font-semibold py-1 px-3 rounded transition">
                        + New Custom Sweep
                    </button>
                </div>

                {showCustomForm && (
                    <div className="mt-3 space-y-3">
                        <div>
                            <label className="text-xs text-gray-400 block mb-1">Sweep Name</label>
                            <input type="text" value={customForm.name}
                                   onChange={e => setCustomForm({ ...customForm, name: e.target.value })}
                                   className="w-full bg-gray-700 text-white px-3 py-1.5 rounded text-sm"
                                   placeholder="e.g. Experiment A" />
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="text-xs text-gray-400 block mb-1">Time Budget (minutes)</label>
                                <input type="number" value={customForm.time_budget_minutes}
                                       onChange={e => setCustomForm({ ...customForm, time_budget_minutes: e.target.value })}
                                       className="w-full bg-gray-700 text-white px-3 py-1.5 rounded text-sm" min="1" />
                            </div>
                            <div>
                                <label className="text-xs text-gray-400 block mb-1">Number of Workers</label>
                                <input type="number" value={customForm.num_workers}
                                       onChange={e => setCustomForm({ ...customForm, num_workers: e.target.value })}
                                       className="w-full bg-gray-700 text-white px-3 py-1.5 rounded text-sm" min="1" max="10" />
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={createCustomSweep}
                                    className="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold py-1.5 px-4 rounded transition">
                                Create
                            </button>
                            <button onClick={() => setShowCustomForm(false)}
                                    className="bg-gray-600 hover:bg-gray-700 text-white text-xs py-1.5 px-4 rounded transition">
                                Cancel
                            </button>
                        </div>
                    </div>
                )}

                {customSweeps.length === 0 ? (
                    <div className="text-gray-500 text-sm mt-3">No custom sweeps.</div>
                ) : (
                    <div className="space-y-3 mt-3">
                        {customSweeps.map(sweep => {
                            const progress = getProgressPercent(sweep);
                            const jobStats = sweep.job_stats || {};
                            const statusColor = sweep.status === 'running' ? 'text-green-400'
                                : sweep.status === 'completed' ? 'text-blue-400'
                                : sweep.status === 'paused' ? 'text-yellow-400'
                                : 'text-gray-400';

                            return (
                                <div key={sweep.id} className="bg-gray-700/50 rounded p-3">
                                    <div className="flex justify-between items-start mb-2">
                                        <div>
                                            <div className="font-semibold text-white">{sweep.name}</div>
                                            <div className="text-xs text-gray-400 mt-1">Created: {formatTimestamp(sweep.created_at)}</div>
                                        </div>
                                        <div className={`text-sm font-semibold ${statusColor}`}>{sweep.status.toUpperCase()}</div>
                                    </div>
                                    <div className="mb-2">
                                        <div className="flex justify-between text-xs text-gray-400 mb-1">
                                            <span>Progress: {sweep.completed_configs} / {sweep.total_configs}</span>
                                            <span>{progress}%</span>
                                        </div>
                                        <div className="w-full bg-gray-600 rounded-full h-2">
                                            <div className="bg-blue-500 h-2 rounded-full transition-all" style={{ width: `${progress}%` }}></div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 text-xs text-gray-400 mb-3">
                                        <span>Pending: {jobStats.pending || 0}</span>
                                        <span>Claimed: {jobStats.claimed || 0}</span>
                                        <span>Completed: {jobStats.completed || 0}</span>
                                        <span>Failed: {jobStats.failed || 0}</span>
                                    </div>
                                    <div className="flex gap-2">
                                        {sweep.status === 'running' && (
                                            <button onClick={() => updateSweepStatus(sweep.id, 'paused')}
                                                    className="bg-yellow-600 hover:bg-yellow-700 text-white text-xs py-1 px-3 rounded transition">
                                                Pause
                                            </button>
                                        )}
                                        {sweep.status === 'paused' && (
                                            <button onClick={() => updateSweepStatus(sweep.id, 'running')}
                                                    className="bg-green-600 hover:bg-green-700 text-white text-xs py-1 px-3 rounded transition">
                                                Resume
                                            </button>
                                        )}
                                        {sweep.status !== 'completed' && (
                                            <button onClick={() => updateSweepStatus(sweep.id, 'cancelled')}
                                                    className="bg-red-600 hover:bg-red-700 text-white text-xs py-1 px-3 rounded transition">
                                                Cancel
                                            </button>
                                        )}
                                        <button onClick={() => deleteSweep(sweep.id)}
                                                className="bg-gray-600 hover:bg-gray-700 text-white text-xs py-1 px-3 rounded transition">
                                            Delete
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}
            </div>
            
            <Card title="WORKERS">
                {workers.length === 0 ? (
                    <div className="text-gray-500 text-sm">No workers connected. Start a worker with push-to-server.py</div>
                ) : (
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead>
                                <tr className="text-left text-gray-400 border-b border-gray-700">
                                    <th className="pb-2 pr-3">Name</th>
                                    <th className="pb-2 pr-3">Hostname</th>
                                    <th className="pb-2 pr-3">Status</th>
                                    <th className="pb-2 pr-3">Last Seen</th>
                                    <th className="pb-2 pr-3">CPU Cores</th>
                                </tr>
                            </thead>
                            <tbody>
                                {workers.map(worker => {
                                    const status = getWorkerStatus(worker);
                                    const machineInfo = worker.machine_info || {};
                                    
                                    return (
                                        <tr key={worker.id} className="border-b border-gray-800">
                                            <td className="py-2 pr-3 font-mono text-blue-300">{worker.name}</td>
                                            <td className="py-2 pr-3 text-gray-300">{worker.hostname}</td>
                                            <td className={`py-2 pr-3 font-semibold ${status.color}`}>{status.label}</td>
                                            <td className="py-2 pr-3 text-gray-400 text-xs">
                                                {formatTimestamp(worker.last_seen)}
                                            </td>
                                            <td className="py-2 pr-3 text-gray-400">{machineInfo.cpu_count || '-'}</td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                )}
            </Card>
        </div>
    );
}

// ─── App ────────────────────────────────────────────────────────
function App() {
    const [tab, setTab] = useState('dashboard');
    const [status, setStatus] = useState({});
    const [trades, setTrades] = useState([]);
    const [equity, setEquity] = useState([]);
    const [toast, setToast] = useState(null);

    useEffect(() => {
        const loadStatus = () => api.get('/api/status').then(setStatus).catch(() => {});
        const loadTrades = () => {
            api.get('/api/trades').then(d => setTrades(d.trades || [])).catch(() => {});
            api.get('/api/equity').then(d => setEquity(d.equity || [])).catch(() => {});
        };
        loadStatus(); loadTrades();
        const s1 = setInterval(loadStatus, 10000);
        const s2 = setInterval(loadTrades, 30000);
        return () => { clearInterval(s1); clearInterval(s2); };
    }, []);

    async function emergencyClose() {
        if (!confirm('Close position NOW?')) return;
        try {
            await api.post('/api/emergency/close');
            setToast({ message: 'Emergency close signal sent', type: 'success' });
        } catch (e) { setToast({ message: e.message, type: 'error' }); }
    }

    async function resetKillSwitch() {
        if (!confirm('Reset kill switch? This will clear consecutive losses and resume trading.')) return;
        try {
            await api.post('/api/killswitch/reset');
            setToast({ message: 'Kill switch reset — trading resumed', type: 'success' });
            api.get('/api/status').then(setStatus);
        } catch (e) { setToast({ message: e.message, type: 'error' }); }
    }

    async function togglePause() {
        const url = status.trading_paused ? '/api/emergency/resume' : '/api/emergency/pause';
        try {
            await api.post(url);
            setToast({ message: status.trading_paused ? 'Trading resumed' : 'Trading paused', type: 'success' });
            api.get('/api/status').then(setStatus);
        } catch (e) { setToast({ message: e.message, type: 'error' }); }
    }

    const tabs = [
        { id: 'dashboard', label: 'Dashboard' },
        { id: 'settings', label: 'Settings' },
        { id: 'logs', label: 'Logs' },
        { id: 'signals', label: 'Signals' },
        { id: 'autoresearch', label: 'AutoResearch' },
        { id: 'orchestrator', label: 'Orchestrator' },
        { id: 'leaderboard', label: 'Leaderboard' },
    ];

    return (
        <div className="max-w-6xl mx-auto px-4 py-6">
            {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

            <div className="flex items-center justify-between mb-6">
                <h1 className="text-xl font-bold">Trading Bot Dashboard</h1>
                <div className="flex gap-1 bg-gray-800 rounded-lg p-1">
                    {tabs.map(t => (
                        <button key={t.id} onClick={() => setTab(t.id)}
                                className={`px-4 py-1.5 rounded text-sm font-medium transition ${
                                    tab === t.id ? 'bg-blue-600 text-white' : 'text-gray-400 hover:text-white'
                                }`}>
                            {t.label}
                        </button>
                    ))}
                </div>
            </div>

            {tab === 'dashboard' && (
                <>
                    <DashboardTab status={status} trades={trades} equity={equity} />
                    <div className="flex gap-3 mt-4">
                        <button onClick={emergencyClose}
                                className="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-6 rounded transition">
                            Close Position NOW
                        </button>
                        <button onClick={togglePause}
                                className={`font-semibold py-2 px-6 rounded transition ${
                                    status.trading_paused
                                        ? 'bg-green-600 hover:bg-green-700 text-white'
                                        : 'bg-yellow-600 hover:bg-yellow-700 text-white'
                                }`}>
                            {status.trading_paused ? 'Resume Trading' : 'Pause Trading'}
                        </button>
                        {status.kill_switch_paused && (
                            <button onClick={resetKillSwitch}
                                    className="bg-orange-600 hover:bg-orange-700 text-white font-semibold py-2 px-6 rounded transition">
                                Reset Kill Switch
                            </button>
                        )}
                    </div>
                </>
            )}
            {tab === 'settings' && <SettingsTab onToast={(msg, type) => setToast({ message: msg, type })} />}
            {tab === 'logs' && <LogsTab />}
            {tab === 'signals' && <SignalsTab />}
            {tab === 'autoresearch' && <AutoResearchTab onToast={(msg, type) => setToast({ message: msg, type })} />}
            {tab === 'orchestrator' && <OrchestratorTab onToast={(msg, type) => setToast({ message: msg, type })} />}
            {tab === 'leaderboard' && <LeaderboardTab onToast={(msg, type) => setToast({ message: msg, type })} />}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
